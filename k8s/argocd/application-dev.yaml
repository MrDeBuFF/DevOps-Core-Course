apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-info-dev
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/MrDeBuFF/DevOps-Core-Course.git
    targetRevision: lab13
    path: k8s/devops-info-chart
    helm:
      valueFiles:
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true