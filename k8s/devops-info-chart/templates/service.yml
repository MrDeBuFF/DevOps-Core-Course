apiVersion: v1
kind: Service
metadata:
  name: {{ include "devops-info-chart.fullname" . }}

spec:
  type: {{ .Values.service.type }}

  selector:
    app: devops-info

  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      nodePort: {{ .Values.service.nodePort }}