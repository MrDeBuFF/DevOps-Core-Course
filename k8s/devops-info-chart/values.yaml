replicaCount: 5

image:
  repository: mrdebuff/devops-info-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 80
  targetPort: 6000
  nodePort: 30080

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

env:
  VERSION: "v1"
  APP_ENV: "dev"

livenessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 5

readinessProbe:
  path: /health
  initialDelaySeconds: 5
  periodSeconds: 3

secret:
  username: "change-me"
  password: "change-me"

persistence:
  enabled: true
  size: 100Mi
  storageClass: ""