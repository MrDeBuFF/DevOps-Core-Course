- name: Install Docker
  block:

    - name: Install required system packages
      apt:
        name:
          - ca-certificates
          - gnupg
          - lsb-release
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker packages
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present

  rescue:

    - name: Wait before retry
      pause:
        seconds: 10

    - name: Retry apt update
      command: apt-get update

  tags:
    - docker
    - docker_install

  become: true

- name: Configure Docker
  block:

    - name: Ensure Docker running
      service:
        name: docker
        state: started
        enabled: true

    - name: Add user to docker group
      user:
        name: "{{ docker_user }}"
        groups: docker
        append: yes

    - name: Install python docker SDK
      pip:
        name: docker

  always:

    - name: Ensure docker service enabled
      service:
        name: docker
        state: started
        enabled: true

  become: true

  tags:
    - docker
    - docker_config